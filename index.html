<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR: Scan & Appear</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugPanelError: false;">
      
      <a-assets>
        <a-asset-item id="tiger" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity 
          gltf-model="#tiger" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
    
  </body>
</html>
